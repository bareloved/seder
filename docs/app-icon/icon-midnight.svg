  <g transform="translate(512, 500) rotate(-8)">
    <rect x="-320" y="78" width="640" height="120" rx="60" fill="url(#g3)" opacity="0.85"/>
    <rect x="-270" y="-60" width="540" height="120" rx="60" fill="url(#g2)" opacity="0.92"/>
    <rect x="-210" y="-198" width="420" height="120" rx="60" fill="url(#g1)"/>
  </g>
  <rect width="1024" height="1024" rx="224" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1.5"/>
</svg>
